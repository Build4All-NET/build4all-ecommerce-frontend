name: Add Tester to App (TestFlight Internal)

on:
  repository_dispatch:
    types: [add_tester_to_app]
  workflow_dispatch:
    inputs:
      email:
        description: "Tester email"
        required: true
      first_name:
        description: "First name"
        required: true
      last_name:
        description: "Last name"
        required: false
        default: "User"
      bundle_id:
        description: "iOS bundle ID (e.g. com.example.app)"
        required: true
      api_base_url:
        description: "Backend API base URL (for callback)"
        required: false
      link_id:
        description: "Owner project link ID (for callback)"
        required: false
      build_id:
        description: "Build / job ID (for callback)"
        required: false

permissions:
  contents: read

jobs:
  add-tester:
    runs-on: ubuntu-latest

    env:
      CI_CALLBACK_TOKEN: ${{ secrets.CI_CALLBACK_TOKEN }}

      ASC_KEY_ID:     ${{ secrets.ASC_KEY_ID }}
      ASC_ISSUER_ID:  ${{ secrets.ASC_ISSUER_ID }}
      ASC_KEY_P8_B64: ${{ secrets.ASC_KEY_P8_B64 }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Save client payload locally
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import json, os, pathlib
          event = json.load(open(os.environ["GITHUB_EVENT_PATH"], "r", encoding="utf-8"))
          payload = event.get("client_payload") or {}
          pathlib.Path("/tmp/client_payload.json").write_text(
              json.dumps(payload, ensure_ascii=False),
              encoding="utf-8"
          )
          print("✅ Saved /tmp/client_payload.json")
          PY

      - name: Extract parameters
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import json, os

          event_name = os.environ.get("GITHUB_EVENT_NAME", "")

          if event_name == "repository_dispatch":
              p   = json.load(open("/tmp/client_payload.json", "r", encoding="utf-8"))
              cfg = p.get("CONFIG") or {}

              def pick(*keys):
                  for k in keys:
                      v = cfg.get(k) or p.get(k)
                      if v not in (None, "", []):
                          return str(v).strip()
                  return ""

              email      = pick("email", "ownerEmail")
              first_name = pick("firstName", "first_name")
              last_name  = pick("lastName",  "last_name")
              bundle_id  = pick("bundleId",  "iosBundleId", "IOS_BUNDLE_ID", "PACKAGE_NAME")
              api_base   = pick("API_BASE_URL").rstrip("/")
              link_id    = pick("OWNER_PROJECT_LINK_ID", "ownerProjectLinkId")
              build_id   = pick("BUILD_ID", "buildId")

              # Full name fallback
              if not first_name:
                  full   = pick("name", "ownerName")
                  parts  = full.split() if full else []
                  first_name = parts[0] if parts else "Tester"
                  if not last_name:
                      last_name = " ".join(parts[1:]) if len(parts) > 1 else "User"

          else:
              # workflow_dispatch — GitHub sets INPUT_* env vars
              email      = os.environ.get("INPUT_EMAIL",        "").strip()
              first_name = os.environ.get("INPUT_FIRST_NAME",   "").strip()
              last_name  = os.environ.get("INPUT_LAST_NAME",    "User").strip()
              bundle_id  = os.environ.get("INPUT_BUNDLE_ID",    "").strip()
              api_base   = os.environ.get("INPUT_API_BASE_URL", "").strip().rstrip("/")
              link_id    = os.environ.get("INPUT_LINK_ID",      "").strip()
              build_id   = os.environ.get("INPUT_BUILD_ID",     "").strip()

          if not email:
              raise SystemExit("❌ Missing required parameter: email")
          if not bundle_id:
              raise SystemExit("❌ Missing required parameter: bundle_id / bundleId")
          if not first_name:
              first_name = "Tester"
          if not last_name:
              last_name = "User"

          print(f"email      = {email}")
          print(f"first_name = {first_name}")
          print(f"last_name  = {last_name}")
          print(f"bundle_id  = {bundle_id}")
          print(f"api_base   = {api_base or '(not provided)'}")
          print(f"link_id    = {link_id  or '(not provided)'}")
          print(f"build_id   = {build_id or '(not provided)'}")

          with open(os.environ["GITHUB_ENV"], "a", encoding="utf-8") as f:
              f.write(f"TESTER_EMAIL={email}\n")
              f.write(f"TESTER_FIRST={first_name}\n")
              f.write(f"TESTER_LAST={last_name}\n")
              f.write(f"TESTER_BUNDLE_ID={bundle_id}\n")
              f.write(f"API_BASE={api_base}\n")
              f.write(f"LINK_ID={link_id}\n")
              f.write(f"BUILD_ID={build_id}\n")
          PY

      - name: Create App Store Connect api_key.json
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p .private
          echo "${ASC_KEY_P8_B64}" | base64 --decode > ".private/AuthKey_${ASC_KEY_ID}.p8"
          python3 - <<'PY'
          import json, pathlib, os
          key_path = pathlib.Path(f".private/AuthKey_{os.environ['ASC_KEY_ID']}.p8")
          api_key_data = {
              "key_id":    os.environ["ASC_KEY_ID"].strip(),
              "issuer_id": os.environ["ASC_ISSUER_ID"].strip(),
              "key":       key_path.read_text(encoding="utf-8"),
              "in_house":  False
          }
          pathlib.Path(".private/api_key.json").write_text(
              json.dumps(api_key_data, ensure_ascii=False, indent=2)
          )
          print("✅ api_key.json written")
          PY

      - name: Install Python dependencies
        shell: bash
        run: |
          python3 -m venv .venv
          source .venv/bin/activate
          python3 -m pip install --upgrade pip --quiet
          python3 -m pip install PyJWT cryptography requests --quiet
          echo "VIRTUAL_ENV=$VIRTUAL_ENV" >> "$GITHUB_ENV"
          echo "$VIRTUAL_ENV/bin"         >> "$GITHUB_PATH"

      - name: Add tester to app
        shell: bash
        run: |
          set -euo pipefail
          python3 "$GITHUB_WORKSPACE/.github/scripts/add_tester_to_app.py" \
            ".private/api_key.json" \
            "$TESTER_BUNDLE_ID" \
            "$TESTER_EMAIL" \
            "$TESTER_FIRST" \
            "$TESTER_LAST"

      - name: 📡 Report result to backend
        if: always()
        shell: bash
        run: |
          set +e

          if [ -z "${API_BASE:-}" ] || [ -z "${CI_CALLBACK_TOKEN:-}" ]; then
            echo "ℹ️ No API_BASE or CI_CALLBACK_TOKEN — skipping callback"
            exit 0
          fi

          STATUS="unknown"
          MESSAGE=""
          if [ -f "tester_result.json" ]; then
            STATUS="$(python3  -c "import json; print(json.load(open('tester_result.json'))['status'])")"
            MESSAGE="$(python3 -c "import json; print(json.load(open('tester_result.json'))['message'])")"
          fi

          JOB_STATUS="${{ job.status }}"
          if [ "$JOB_STATUS" != "success" ]; then
            STATUS="ERROR"
            MESSAGE="Workflow ${JOB_STATUS} — see GitHub Actions logs for details"
          fi

          echo "Reporting status=${STATUS} to ${API_BASE}"

          curl -sS -X PUT "${API_BASE}/api/ci/add-tester/result" \
            -H "Content-Type: application/json" \
            -H "X-Auth-Token: ${CI_CALLBACK_TOKEN}" \
            -d "{\"buildId\":\"${BUILD_ID}\",\"linkId\":\"${LINK_ID}\",\"status\":\"${STATUS}\",\"message\":\"${MESSAGE}\"}" \
            || true
