name: Add Tester to App (TestFlight)

on:
  repository_dispatch:
    types: [add_tester_to_app]
  workflow_dispatch:
    inputs:
      email:
        description: "Tester email address"
        required: true
      first_name:
        description: "First name"
        required: true
      last_name:
        description: "Last name"
        required: true
      bundle_id:
        description: "iOS app bundle ID (e.g. com.example.myapp)"
        required: true

permissions:
  contents: read

jobs:
  add-tester:
    runs-on: ubuntu-latest

    env:
      ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
      ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
      ASC_KEY_P8_B64: ${{ secrets.ASC_KEY_P8_B64 }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Extract parameters
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import json, os

          # Support both repository_dispatch payload and workflow_dispatch inputs
          event_name = os.environ.get("GITHUB_EVENT_NAME", "")

          if event_name == "repository_dispatch":
              event = json.load(open(os.environ["GITHUB_EVENT_PATH"], encoding="utf-8"))
              p = event.get("client_payload") or {}
              cfg = p.get("CONFIG") or {}

              def pick(*keys):
                  for k in keys:
                      v = cfg.get(k) or p.get(k)
                      if v:
                          return str(v).strip()
                  return ""

              email      = pick("email", "ownerEmail")
              first_name = pick("firstName", "first_name")
              last_name  = pick("lastName", "last_name")
              bundle_id  = pick("bundleId", "bundle_id", "iosBundleId", "IOS_BUNDLE_ID")

              # Support full name fallback
              if not first_name:
                  full = pick("name", "ownerName")
                  parts = full.split() if full else []
                  first_name = parts[0] if parts else "Tester"
                  last_name  = " ".join(parts[1:]) if len(parts) > 1 else (last_name or "User")

          else:
              # workflow_dispatch — read from env vars set by GitHub
              email      = os.environ.get("INPUT_EMAIL", "").strip()
              first_name = os.environ.get("INPUT_FIRST_NAME", "").strip()
              last_name  = os.environ.get("INPUT_LAST_NAME", "").strip()
              bundle_id  = os.environ.get("INPUT_BUNDLE_ID", "").strip()

          if not email:
              raise SystemExit("❌ Missing required parameter: email")
          if not bundle_id:
              raise SystemExit("❌ Missing required parameter: bundle_id / bundleId")
          if not first_name:
              first_name = "Tester"
          if not last_name:
              last_name = "User"

          print(f"email      = {email}")
          print(f"first_name = {first_name}")
          print(f"last_name  = {last_name}")
          print(f"bundle_id  = {bundle_id}")

          with open(os.environ["GITHUB_ENV"], "a") as f:
              f.write(f"TESTER_EMAIL={email}\n")
              f.write(f"TESTER_FIRST={first_name}\n")
              f.write(f"TESTER_LAST={last_name}\n")
              f.write(f"TESTER_BUNDLE_ID={bundle_id}\n")
          PY

      - name: Install Python dependencies
        shell: bash
        run: pip3 install requests pyjwt cryptography --quiet

      - name: Write App Store Connect API key
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p .private
          echo "$ASC_KEY_P8_B64" | base64 -d > .private/api_key.p8
          python3 - <<'PY'
          import json, os
          data = {
              "key_id":    os.environ["ASC_KEY_ID"],
              "issuer_id": os.environ["ASC_ISSUER_ID"],
              "key":       open(".private/api_key.p8").read()
          }
          json.dump(data, open(".private/api_key.json", "w"))
          print("✅ api_key.json written")
          PY

      - name: Add tester to app
        shell: bash
        run: |
          set -euo pipefail
          python3 "$GITHUB_WORKSPACE/.github/scripts/add_tester_to_app.py" \
            ".private/api_key.json" \
            "$TESTER_BUNDLE_ID" \
            "$TESTER_EMAIL" \
            "$TESTER_FIRST" \
            "$TESTER_LAST"
